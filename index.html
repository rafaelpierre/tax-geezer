// ─── Styles ───────────────────────────────────────────────────────────────────
// styles in <style> tag

// ─── UK Tax Constants 2024/25 ─────────────────────────────────────────────────
const TAX = {
  personalAllowance: 12570,
  basicRateLimit: 50270,
  higherRateLimit: 125140,
  basicRate: 0.20, higherRate: 0.40, additionalRate: 0.45,
  niPrimary1: 12570, niPrimary2: 50270,
  niRate1: 0.08, niRate2: 0.02,
  isaAllowance: 20000, pensionAllowance: 60000,
  statePensionAnnual: 221.20 * 52,
};

function calcIncomeTax(grossIncome) {
  if (grossIncome <= 0) return { tax: 0, ni: 0, band: "No Income" };
  const pa = grossIncome > 100000
    ? Math.max(0, TAX.personalAllowance - Math.floor((grossIncome - 100000) / 2))
    : TAX.personalAllowance;
  const taxable = Math.max(0, grossIncome - pa);
  const basicBand = Math.max(0, TAX.basicRateLimit - pa);
  let tax = Math.min(taxable, basicBand) * TAX.basicRate;
  if (grossIncome > TAX.basicRateLimit)
    tax += Math.min(grossIncome - TAX.basicRateLimit, TAX.higherRateLimit - TAX.basicRateLimit) * TAX.higherRate;
  if (grossIncome > TAX.higherRateLimit)
    tax += (grossIncome - TAX.higherRateLimit) * TAX.additionalRate;
  let ni = 0;
  if (grossIncome > TAX.niPrimary1)
    ni += Math.min(grossIncome - TAX.niPrimary1, TAX.niPrimary2 - TAX.niPrimary1) * TAX.niRate1;
  if (grossIncome > TAX.niPrimary2)
    ni += (grossIncome - TAX.niPrimary2) * TAX.niRate2;
  const band = grossIncome <= TAX.personalAllowance ? "Personal Allowance"
    : grossIncome <= TAX.basicRateLimit ? "Basic Rate (20%)"
    : grossIncome <= TAX.higherRateLimit ? "Higher Rate (40%)"
    : "Additional Rate (45%)";
  return { tax: Math.round(tax), ni: Math.round(ni), band };
}

function calcPensionRelief(monthlyContrib, grossIncome, salarySacrifice) {
  const annualContrib = monthlyContrib * 12;
  const marginalRate = grossIncome > TAX.basicRateLimit ? 0.40 : grossIncome > TAX.personalAllowance ? 0.20 : 0;
  if (salarySacrifice) {
    const niSaving = grossIncome > TAX.niPrimary1
      ? Math.min(annualContrib, Math.max(0, TAX.niPrimary2 - grossIncome)) * TAX.niRate1
        + (grossIncome > TAX.niPrimary2 ? annualContrib * TAX.niRate2 : 0)
      : 0;
    const relief = annualContrib * marginalRate + niSaving;
    return { relief: Math.round(relief), effectiveCost: Math.round(annualContrib - relief) };
  }
  const relief = annualContrib * marginalRate;
  return { relief: Math.round(relief), effectiveCost: Math.round(annualContrib - relief) };
}

const fmt = (n) => {
  if (n == null || isNaN(n)) return "£0";
  const abs = Math.abs(n); const sign = n < 0 ? "-" : "";
  if (abs >= 1e6) return `${sign}£${(abs / 1e6).toFixed(2)}m`;
  if (abs >= 1e3) return `${sign}£${(abs / 1e3).toFixed(0)}k`;
  return `${sign}£${Math.round(abs).toLocaleString()}`;
};
const pct = (n) => `${Number(n).toFixed(1)}%`;

// ─── Projection Engine ────────────────────────────────────────────────────────
function generateProjection(p, costs, adjustForInflation) {
  const years = (p.retirementAge - p.currentAge) + 25;
  const data = [];
  let isa = p.isaBalance, pension = p.pensionBalance, other = p.otherBalance;
  const inflRate = adjustForInflation ? p.inflation / 100 : 0;
  const empMatch = p.pensionContrib * (p.employerMatch / 100);
  const monthlyLiving = Object.values(costs).reduce((a, b) => a + b, 0);
  const retireMonthlyLiving = monthlyLiving * (p.retireCostRatio / 100);

  for (let y = 0; y <= years; y++) {
    const age = p.currentAge + y;
    const inRetirement = age >= p.retirementAge;
    const inflFactor = Math.pow(1 + inflRate, y);
    const statePension = age >= 66 ? TAX.statePensionAnnual : 0;
    const portfolioTotal = isa + pension + other;
    const annualDraw = inRetirement ? portfolioTotal * 0.04 : 0;
    const pensionDraw = inRetirement ? annualDraw * 0.5 : 0;
    const retirementGross = pensionDraw + statePension;
    const { tax: retTax } = calcIncomeTax(retirementGross);
    const netRetirementIncome = annualDraw + statePension - retTax;
    const annualLivingCosts = inRetirement ? retireMonthlyLiving * 12 : monthlyLiving * 12;
    const retirementSurplus = inRetirement ? netRetirementIncome - annualLivingCosts : null;

    data.push({
      age,
      year: new Date().getFullYear() + y,
      isa:             Math.round(isa / inflFactor),
      pension:         Math.round(pension / inflFactor),
      other:           Math.round(other / inflFactor),
      total:           Math.round((isa + pension + other) / inflFactor),
      annualDraw:      Math.round(annualDraw / inflFactor),
      taxInRetirement: Math.round(retTax),
      netAnnualIncome: Math.round(netRetirementIncome / inflFactor),
      livingCosts:     Math.round(annualLivingCosts / inflFactor),
      surplus:         retirementSurplus !== null ? Math.round(retirementSurplus / inflFactor) : null,
    });

    if (!inRetirement) {
      isa     = isa     * (1 + p.isaReturn / 100)     + p.isaContrib * 12;
      pension = pension * (1 + p.pensionReturn / 100) + (p.pensionContrib + empMatch) * 12;
      other   = other   * (1 + p.otherReturn / 100)   + p.otherContrib * 12;
    } else {
      const draw = annualDraw / 12;
      isa     = Math.max(0, isa     * (1 + p.isaReturn / 100)     - draw * 6);
      pension = Math.max(0, pension * (1 + p.pensionReturn / 100) - draw * 6);
      other   = Math.max(0, other   * (1 + p.otherReturn / 100)   - draw * 2);
    }
  }
  return data;
}

// ─── Tax Tips ─────────────────────────────────────────────────────────────────
function getTaxTips(p, monthlySurplus) {
  const gross = p.grossSalary;
  const { tax, ni, band } = calcIncomeTax(gross);
  const annualISA = p.isaContrib * 12;
  const annualPension = p.pensionContrib * 12;
  const tips = [];

  if (monthlySurplus < 0) {
    tips.push({ type: "red", title: "🚨 Monthly Cash Flow Deficit", text: `Your take-home (${fmt((gross - tax - ni) / 12)}/mo) minus living costs and contributions leaves a deficit of ${fmt(Math.abs(monthlySurplus))}/mo. Reduce spending or contributions to avoid going into debt.` });
  } else if (monthlySurplus < 200) {
    tips.push({ type: "amber", title: "⚠️ Thin Monthly Buffer", text: `You have only ${fmt(monthlySurplus)}/mo left after costs and contributions. Consider building a 3–6 month emergency fund before increasing investments.` });
  }
  // ── Pension tip: band-specific, mutually exclusive ──
  if (gross > 125140) {
    // Additional rate: suggest bringing income towards £100k to restore Personal Allowance
    const toRestore = Math.min(gross - 100000, TAX.pensionAllowance);
    const monthlySugg = Math.min(Math.round(toRestore / 12), Math.round(TAX.pensionAllowance / 12));
    const savingSlice1 = Math.min(gross - 125140, gross - 100000) * 0.45;
    const savingSlice2 = Math.min(25140, Math.max(0, gross - 100000 - (gross - 125140))) * 0.40;
    const totalSaving = Math.round(savingSlice1 + savingSlice2);
    tips.push({ type: "red", title: "🚨 Additional Rate (45%) — Pension is Priority", text: `At £${gross.toLocaleString()} you pay 45% on income above £125,140. Your most valuable move is to salary sacrifice enough to bring taxable income down to £100k, fully restoring your Personal Allowance. This means contributing ~${fmt(monthlySugg)}/mo more to pension (within the £60k/yr limit), saving up to ~${fmt(toRestore * 0.45)} in tax.` });
  } else if (gross > 100000) {
    // 60% taper trap: £100k–£125,140
    const toEscape = gross - 100000;
    const monthlySugg = Math.min(Math.round(toEscape / 12), Math.round(TAX.pensionAllowance / 12));
    const saving = Math.round(Math.min(toEscape, 25140) * 0.60);
    tips.push({ type: "red", title: "🚨 £100k–£125k: Effective 60% Tax Trap", text: `Between £100k and £125,140 your marginal rate is effectively 60% — every extra £1 earned withdraws 50p of Personal Allowance. Salary sacrifice ${fmt(monthlySugg)}/mo more into your pension to bring gross pay back to £100k, restoring your full PA and saving ~${fmt(saving)}.` });
  } else if (gross > TAX.basicRateLimit) {
    // Standard higher rate: practical suggestion — not "drop to basic rate", just gain 40% relief
    const higherSlice = gross - TAX.basicRateLimit;
    const headroom = Math.max(0, TAX.pensionAllowance - annualPension);
    const suggestExtra = Math.min(Math.round(higherSlice * 0.4 / 12), Math.round(headroom / 12), 1000);
    if (suggestExtra > 50) {
      tips.push({ type: "green", title: "💡 Higher Rate (40%) — Boost Pension for Relief", text: `You pay 40% tax on the ${fmt(higherSlice)} above the basic rate threshold. Each £1 contributed to pension costs you just 60p after relief. Adding ${fmt(suggestExtra)}/mo saves ~${fmt(suggestExtra * 12 * 0.40)}/yr in tax — and you still have ${fmt(Math.round(headroom / 12) - suggestExtra)}/mo of pension headroom remaining.` });
    }
  }
  if (annualISA < TAX.isaAllowance && annualISA < 10000 && monthlySurplus > 0) {
    tips.push({ type: "amber", title: "📦 Under-using ISA Allowance", text: `You're using ${fmt(annualISA)}/yr of your £20k ISA allowance. With a positive cash surplus, consider redirecting ${fmt(Math.min(monthlySurplus, (TAX.isaAllowance - annualISA) / 12))}/mo into your ISA for tax-free growth.` });
  }
  if (annualISA > TAX.isaAllowance) {
    tips.push({ type: "red", title: "⚠️ ISA Limit Exceeded", text: `ISA contributions of ${fmt(annualISA)}/yr exceed the £20,000 limit. Redirect excess to pension or GIA.` });
  }
  if (annualPension > TAX.pensionAllowance) {
    tips.push({ type: "red", title: "⚠️ Pension Allowance Exceeded", text: `Pension contributions of ${fmt(annualPension)}/yr exceed the £60,000 limit. Excess is taxed at your marginal rate.` });
  }
  if (p.otherBalance > 30000 && annualISA < TAX.isaAllowance) {
    tips.push({ type: "amber", title: "📊 GIA: Bed & ISA Strategy", text: `Hold ${fmt(p.otherBalance)} in a GIA? Each April, sell up to your £3,000 CGT allowance and repurchase inside your ISA to gradually shelter gains.` });
  }
  const { relief: ssRelief } = calcPensionRelief(p.pensionContrib, gross, true);
  const { relief: rasRelief } = calcPensionRelief(p.pensionContrib, gross, false);
  if (!p.salarySacrifice && ssRelief - rasRelief > 200) {
    tips.push({ type: "green", title: "💰 Switch to Salary Sacrifice", text: `Switching your pension scheme would save an extra ${fmt(ssRelief - rasRelief)}/yr by eliminating NI on contributions.` });
  }
  return { tax, ni, band, tips };
}

function getOptimalAllocation(p, availableBudget) {
  const gross = p.grossSalary;
  const { tax, ni } = calcIncomeTax(gross);
  const netMonthly = (gross - tax - ni) / 12;
  const budget = availableBudget != null ? Math.max(0, availableBudget) : Math.max(0, netMonthly);
  const isaMax = Math.round(TAX.isaAllowance / 12);
  const pensionMax = Math.round(TAX.pensionAllowance / 12);
  let pensionRec, isaRec, otherRec, rationale;
  if (gross > 100000) {
    const paRecovery = Math.min(Math.round((gross - 100000) / 12), pensionMax, budget);
    pensionRec = paRecovery;
    const rem = Math.max(0, budget - pensionRec);
    isaRec = Math.min(rem, isaMax);
    otherRec = Math.max(0, rem - isaRec);
    rationale = "Pension maxed first to recover Personal Allowance (escape 60% trap), then ISA, then GIA.";
  } else if (gross > TAX.basicRateLimit) {
    const matchFloor = Math.min(Math.round(gross * (p.employerMatch || 0) / 100 / 12), budget);
    const dropToBasic = Math.min(Math.round((gross - TAX.basicRateLimit) / 12), pensionMax);
    pensionRec = Math.min(Math.max(matchFloor, dropToBasic), budget, pensionMax);
    const rem = Math.max(0, budget - pensionRec);
    isaRec = Math.min(rem, isaMax);
    otherRec = Math.max(0, rem - isaRec);
    rationale = "Pension sized to reclaim 40% relief (drop income to basic rate band), then ISA, then GIA.";
  } else {
    const matchFloor = Math.min(Math.round(gross * (p.employerMatch || 0) / 100 / 12), budget);
    isaRec = Math.min(Math.max(Math.round(budget * 0.6), 0), isaMax, budget);
    pensionRec = Math.min(Math.max(matchFloor, Math.round(budget * 0.35)), pensionMax, Math.max(0, budget - isaRec));
    otherRec = Math.max(0, budget - isaRec - pensionRec);
    rationale = "ISA prioritised for flexibility and tax-free growth. Pension covers employer match minimum. Remainder to GIA.";
  }
  return { pensionRec, isaRec, otherRec, rationale, budget };
}

// ─── Tooltip ─────────────────────────────────────────────────────────────────
function CustomTooltip({ active, payload, label }) {
  if (!active || !payload || !payload.length) return null;
  return (
    <div className="custom-tooltip">
      <div className="tt-label">AGE {label}</div>
      {payload.map((row) => (
        <div key={row.dataKey} className="tt-row">
          <span style={{ color: row.color }}>{row.name}</span>
          <span style={{ color: row.color }}>{fmt(row.value)}</span>
        </div>
      ))}
    </div>
  );
}

                  <div className="tax-card-label">Optimal Allocation</div>
                  <div className="tax-card-val col-pension">{fmt(optAlloc.pensionRec)}/mo pension</div>
                  <div className="tax-card-sub">ISA: {fmt(optAlloc.isaRec)}/mo · GIA: {fmt(optAlloc.otherRec)}/mo<br />Tuned for {band}</div>
                </div>
              </div>
              <div className="tips-list">
                {taxInfo.tips.length > 0
                  ? taxInfo.tips.map((t, i) => (
                      <div key={i} className={`tip-card ${t.type}`}>
                        <div className="tip-title">{t.title}</div>
                        <div className="tip-text">{t.text}</div>
                      </div>
                    ))
                  : (
                    <div className="tip-card">
                      <div className="tip-title">✅ Looking Good</div>
                      <div className="tip-text">Cash flow is positive, allowances are within limits, and your allocation looks tax-efficient. Review annually as your salary and circumstances change.</div>
                    </div>
                  )
                }
              </div>
            </div>

            {/* Milestones table */}
            <div className="chart-wrap">
              <div className="panel-title">Key Milestones</div>
              <table>
                <thead>
                  <tr>
                    {["Age","Year","ISA","Pension","GIA","Total","Net Income","Living Costs","Surplus/Deficit"].map((h) => <th key={h}>{h}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {data
                    .filter((d, i) => i % 5 === 0 || d.age === p.retirementAge || d.age === 66)
                    .slice(0, 14)
                    .map((row) => {
                      const isFireAge = row.age === p.retirementAge;
                      const isStateAge = row.age === 66;
                      const inRetire = row.age >= p.retirementAge;
                      const surplusColor = row.surplus >= 0 ? "var(--green)" : "var(--red)";
                      return (
                        <tr key={row.age} style={{ background: isFireAge ? "#1a180a" : isStateAge ? "#0e1a12" : "transparent" }}>
                          <td style={{ color: isFireAge ? "var(--accent)" : isStateAge ? "var(--green)" : "var(--text)" }}>
                            {row.age}{isFireAge ? " 🎯" : isStateAge ? " 🏛" : ""}
                          </td>
                          <td style={{ color: "var(--muted)" }}>{row.year}</td>
                          <td className="col-isa">{fmt(row.isa)}</td>
                          <td className="col-pension">{fmt(row.pension)}</td>
                          <td className="col-other">{fmt(row.other)}</td>
                          <td className="col-green" style={{ fontWeight: 500 }}>{fmt(row.total)}</td>
                          <td style={{ color: "var(--text)" }}>{inRetire ? fmt(row.netAnnualIncome) : "—"}</td>
                          <td className="col-amber">{inRetire ? fmt(row.livingCosts) : "—"}</td>
                          <td style={{ color: inRetire ? surplusColor : "var(--muted)" }}>
                            {inRetire ? `${row.surplus >= 0 ? "+" : ""}${fmt(row.surplus)}` : "—"}
                          </td>
                        </tr>
                      );
                    })}
                </tbody>
              </table>
            </div>

            {/* Vehicles */}
            <div className="chart-wrap">
              <div className="panel-title">UK Investment Vehicles</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "1rem", fontSize: "0.7rem", color: "var(--muted)", lineHeight: 1.7 }}>
                <div>
                  <div style={{ color: "var(--isa)", marginBottom: "0.3rem", fontSize: "0.6rem", textTransform: "uppercase", letterSpacing: "0.08em" }}>📦 ISA</div>
                  £20k/yr. Zero CGT & income tax. Flexible access. First port of call after employer match.
                </div>
                <div>
                  <div style={{ color: "var(--pension)", marginBottom: "0.3rem", fontSize: "0.6rem", textTransform: "uppercase", letterSpacing: "0.08em" }}>🏛️ Pension</div>
                  £60k/yr. 20–45% relief. NI saving via salary sacrifice. Access from 57 (2028). 25% tax-free lump sum. State pension at 66.
                </div>
                <div>
                  <div style={{ color: "var(--other)", marginBottom: "0.3rem", fontSize: "0.6rem", textTransform: "uppercase", letterSpacing: "0.08em" }}>📊 GIA</div>
                  No limits. CGT £3k/yr. Dividends £500/yr. Use Bed &amp; ISA each April. Last priority after ISA &amp; pension.
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}


const domRoot = ReactDOM.createRoot(document.getElementById("root"));
domRoot.render(React.createElement(App));
  </script>
</body>
</html>
